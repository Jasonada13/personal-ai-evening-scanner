name: Personal Evening AI/Tech Scanner (Educational)

on:
  schedule:
    # Evening US window — convenient for UK 9-5.
    # 22:00 UTC is roughly 18:00 ET (power hour / close / early after-hours).
    # Adjust as needed. Runs Mon-Fri.
    - cron: '0 22 * * 1-5'
  workflow_dispatch:   # Manual trigger from Actions tab (great for testing)

jobs:
  scan-and-alert:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # so the action can optionally commit an updated signals log

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install yfinance requests python-dotenv

      - name: Load Discord webhook (from GitHub Secrets)
        run: |
          echo "DISCORD_WEBHOOK_URL=${{ secrets.DISCORD_WEBHOOK_URL }}" >> $GITHUB_ENV
          echo "PAPER_MODE=true" >> $GITHUB_ENV
          echo "AI_TECH_UNIVERSE=${{ vars.AI_TECH_UNIVERSE || 'NVDA,AMD,TSLA,PLTR,SMCI,AVGO' }}" >> $GITHUB_ENV

      - name: Run evening educational scan + Discord alerts
        id: scan
        run: |
          python scripts/evening_scanner.py 2>&1 | tee scan_output.log

      - name: Upload scan log (for audit / your review)
        uses: actions/upload-artifact@v4
        with:
          name: evening-scan-${{ github.run_number }}
          path: |
            scan_output.log
            signals.jsonl
          retention-days: 90

      # Optional: commit the signals log back to the repo so your Vercel dashboard can show history
      - name: Commit updated signals (if any new ones)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add signals.jsonl || true
          if git diff --staged --quiet; then
            echo "No new signals to commit"
          else
            git commit -m "chore(scanner): evening run ${{ github.run_number }} — signals appended [skip ci]"
            git push
          fi
        continue-on-error: true   # don't fail the job if commit not possible (e.g. no token perms)
